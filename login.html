<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login Corporativo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #0f172a;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: #334155;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5f5;
      border-radius: 6px;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #2563eb;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn:hover {
      background: #1d4ed8;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      color: #64748b;
    }

    .footer a {
      color: #2563eb;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

  </style>
</head>
<body>

  <div class="login-container">
    <h2>Login Corporativo</h2>

    <form>
      <div class="input-group">
        <label>Email corporativo</label>
        <input type="email" placeholder="seuemail@empresa.com" required>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" placeholder="Digite sua senha" required>
      </div>

      <button class="login-btn">Entrar</button>
    </form>

    <div class="footer">
      <p>Esqueceu a senha? <a href="#">Recuperar</a></p>
    </div>
  </div>

</body>
</html>
